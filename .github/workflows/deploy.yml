# Publishes the Vite build to GitHub Pages.
# Repo → Settings → Pages → Build and deployment → Source: GitHub Actions (once).

name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          # Project pages: https://<user>.github.io/<repo>/
          # User-site repo (<user>.github.io): set VITE_BASE_PATH: / in a repo Variable or fork this step.
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_GOOGLE_CLIENT_ID: 205907748929-ihek5jm5g93b6bugptg3vss6d4rhd2ed.apps.googleusercontent.com
          VITE_GOOGLE_API_KEY: ${{ secrets.VITE_GOOGLE_API_KEY }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
